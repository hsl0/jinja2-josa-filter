DOCUMENTATION:
  name: josa
  author: hsl0
  version_added: "0.1.0"
  short_description: 후보로 지정한 조사 중 알맞은 것을 붙입니다
  description:
    - 입력한 명사와 조사 후보에 맞는 한국어 조사를 붙입니다.
  positional: _input, josa
  options:
    _input:
      description: 조사를 붙일 명사.
      type: str
      required: true
    josa:
      description:
        - 지원되는 후보 중 하나로 시작하는 한국어 조사.
        - 지원되는 후보는 C(은), C(는), C(이), C(가), C(을), C(를), C(과), C(와), C(으로), C(로), C(아), C(야)입니다.
        - 지원되는 후보 뒤에 접미사가 붙을 수 있습니다. 예를 들어 C(이는), C(이랑), C(이며), C(이다)는 C(이) 규칙을 따르며 접미사는 그대로 유지됩니다.
      type: str
      required: true
EXAMPLES: |
  - name: 후보로 지정한 주격 조사 붙이기
    ansible.builtin.debug:
      msg: "{{ '집' | hsl0.josa.josa('가') }}"

  - name: 선행 후보로 지정한 확장 조사 붙이기
    ansible.builtin.debug:
      msg: "{{ '지민' | hsl0.josa.josa('이랑') }}"
RETURN:
  _value:
    description: 선택된 한국어 조사가 붙은 입력 명사.
    type: str
