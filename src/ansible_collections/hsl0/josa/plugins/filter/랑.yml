DOCUMENTATION:
  name: 랑
  author: hsl0
  version_added: "0.1.0"
  short_description: Add the appropriate 이랑 or 랑 particle
  description:
    - Appends the appropriate 이랑 or 랑 particle to a Korean noun.
  positional: _input
  options:
    _input:
      description: The noun to which the particle is appended.
      type: str
      required: true
EXAMPLES: |
  - name: Add an 이랑 or 랑 particle
    ansible.builtin.debug:
      msg: "{{ '철수' | hsl0.josa.랑 }}"
RETURN:
  _value:
    description: The input noun with an 이랑 or 랑 particle appended.
    type: str
