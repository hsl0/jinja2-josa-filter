DOCUMENTATION:
  name: 으로
  author: hsl0
  version_added: "0.1.0"
  short_description: Add the appropriate 으로 or 로 particle
  description:
    - Appends the appropriate 으로 or 로 particle to a Korean noun.
  positional: _input
  options:
    _input:
      description: The noun to which the particle is appended.
      type: str
      required: true
EXAMPLES: |
  - name: Add an 으로 or 로 particle
    ansible.builtin.debug:
      msg: "{{ '서울' | hsl0.josa.으로 }}"
RETURN:
  _value:
    description: The input noun with an 으로 or 로 particle appended.
    type: str
