DOCUMENTATION:
  name: 이며
  author: hsl0
  version_added: "0.1.0"
  short_description: Add the appropriate 이며 or 며 particle
  description:
    - Appends the appropriate 이며 or 며 particle to a Korean noun.
  positional: _input
  options:
    _input:
      description: The noun to which the particle is appended.
      type: str
      required: true
EXAMPLES: |
  - name: Add an 이며 or 며 particle
    ansible.builtin.debug:
      msg: "{{ '지민' | hsl0.josa.이며 }}"
RETURN:
  _value:
    description: The input noun with an 이며 or 며 particle appended.
    type: str
