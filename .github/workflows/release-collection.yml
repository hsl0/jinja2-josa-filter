# This workflow builds and publishes the hsl0.josa Ansible Galaxy
# collection when an "ansible-collection/vX.Y.Z" tag is pushed.
#
# The collection vendors the local jinja2_josa_filter source (and
# tjosa) via python-vendorize, so this release does not depend on
# jinja2-josa-filter having been published to PyPI first.

name: Release hsl0.josa collection to Ansible Galaxy

on:
  push:
    tags:
      - "ansible-collection/v*.*.*"

permissions:
  contents: read

jobs:
  pytest:
    uses: ./.github/workflows/pytest.yml

  ansible-test:
    uses: ./.github/workflows/ansible-test.yml

  release-build:
    needs:
      - pytest
      - ansible-test

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install '.[dev]'

      - name: Set collection version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#ansible-collection/v}"
          sed -i "s/^version:.*/version: ${VERSION}/" src/ansible_collections/hsl0/josa/galaxy.yml

      - name: Vendor collection dependencies
        run: python-vendorize

      - name: Build collection
        run: ansible-galaxy collection build src/ansible_collections/hsl0/josa --output-path dist

      - name: Upload collection to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  galaxy-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build

    environment:
      name: galaxy
      url: https://galaxy.ansible.com/ui/repo/published/hsl0/josa/

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install ansible-core
        run: python -m pip install ansible-core

      - name: Download collection artifact
        run: |
          gh release download ${{ github.ref_name }} --pattern "*.tar.gz" --dir dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish collection to Ansible Galaxy
        run: |
          ansible-galaxy collection publish dist/*.tar.gz --token "${{ secrets.GALAXY_TOKEN }}"
