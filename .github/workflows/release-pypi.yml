# This workflow will upload a Python Package to PyPI when a
# "pypi/vX.Y.Z" tag is pushed.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python#publishing-to-package-registries

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Release jinja2-josa-filter to PyPI

on:
  push:
    tags:
      - "pypi/v*.*.*"
  workflow_call:
    inputs:
      version:
        description: "Version to release (e.g. 0.2.0), without the pypi/v prefix"
        required: true
        type: string

permissions:
  contents: read

jobs:
  flake8:
    uses: ./.github/workflows/flake8.yml

  pylint:
    uses: ./.github/workflows/pylint.yml

  pytest:
    uses: ./.github/workflows/pytest.yml

  release-build:
    needs:
      - flake8
      - pylint
      - pytest

    runs-on: ubuntu-latest

    permissions:
      contents: write

    outputs:
      tag: ${{ steps.release.outputs.tag }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Resolve release tag
        id: release
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "tag=pypi/v${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release.outputs.tag }}
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write

    environment:
      name: pypi
      url: https://pypi.org/project/jinja2-josa-filter/

    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        run: |
          gh release download ${{ needs.release-build.outputs.tag }} --pattern "*.whl" --pattern "*.tar.gz" --dir dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
